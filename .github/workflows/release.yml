name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.22'
          cache: true

      - name: Download dependencies
        run: go mod download

      - name: Run tests
        run: go test -v -race -count=1 ./...

      - name: Build binaries
        env:
          VERSION: ${{ github.ref_name }}
        run: |
          mkdir -p dist

          GOOS=linux GOARCH=amd64 go build -ldflags="-s -w -X main.version=${VERSION}" -o dist/membraned-linux-amd64 ./cmd/membraned
          GOOS=linux GOARCH=arm64 go build -ldflags="-s -w -X main.version=${VERSION}" -o dist/membraned-linux-arm64 ./cmd/membraned
          GOOS=darwin GOARCH=amd64 go build -ldflags="-s -w -X main.version=${VERSION}" -o dist/membraned-darwin-amd64 ./cmd/membraned
          GOOS=darwin GOARCH=arm64 go build -ldflags="-s -w -X main.version=${VERSION}" -o dist/membraned-darwin-arm64 ./cmd/membraned

      - name: Generate checksums
        run: |
          cd dist
          sha256sum ./* > checksums.txt

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          files: |
            dist/membraned-linux-amd64
            dist/membraned-linux-arm64
            dist/membraned-darwin-amd64
            dist/membraned-darwin-arm64
            dist/checksums.txt
